<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>^Impossible^ - Free Fire Sensi</title>
  <style>
    body { background: #18182a; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
    h1 { margin-top: 2rem; font-size: 2.2rem; color: #ffce34; letter-spacing: 1.5px; text-shadow: 0 1px 10px #fc117a;}
    .desc { margin-bottom: 2rem; font-size: 1.1rem; color: #ffc7e6; text-align: center;}
    .channel-link { background: linear-gradient(90deg,#fc117a 0%,#ffce34 100%); color: #18182a; padding: 0.9em 2em; border-radius: 30px; text-decoration: none; font-weight: bold;}
    .channel-link:hover { background: linear-gradient(90deg,#ffce34 0%,#fc117a 100%);}
    .search-container { margin: 2em 0 1em 0; text-align: center; width: 96%; max-width: 350px;}
    input[type="text"] { width: 100%; padding: 0.8em; border: none; border-radius: 15px; font-size: 1rem; margin-top: 0.3em; box-shadow: 0 2px 10px #222; }
    .ai-result { margin: 26px auto 1em auto; background: #292947cc; border-radius: 8px; max-width: 500px; width: 95%; box-shadow: 0 3px 13px #000a; padding: 18px 12px; }
    .ai-result b { color: #ffce34;}
    .not-found { color: #ff7181; margin-top: 1em;}
    @media (max-width: 600px) { h1 { font-size: 1.5rem; } .ai-result, .search-container { font-size: 0.98rem; } }
  </style>
</head>
<body>
  <h1>^Impossible^</h1>
  <div class="desc">
    All Free Fire sensitivity (“sensi”) settings<br>All devices &mdash; powered by AI search!
  </div>
  <a class="channel-link" href="https://whatsapp.com/channel/0029VbB0EHkCMY0Cs3Rp7u3n" target="_blank">
    Join Our WhatsApp Channel
  </a>
  <div class="search-container">
    <input type="text" id="search" placeholder="Search your device/model (e.g., Samsung S21, Poco X3, ...)" autocomplete="off">
    <div id="result" class="ai-result" style="display:none;"></div>
  </div>
  <script>
    // Sample list - expand this! (add as many as you want)
    const sensiData = [
      {model: "Poco X3", gen:78, red:94, x2:93, x4:80, awm:38},
      {model: "Samsung M30", gen:85, red:95, x2:98, x4:88, awm:50},
      {model: "iPhone 12", gen:96, red:99, x2:96, x4:87, awm:44},
      {model: "Realme 5 Pro", gen:82, red:90, x2:89, x4:66, awm:40},
      {model: "Redmi Note 10", gen:89, red:96, x2:97, x4:82, awm:43},
      {model: "Samsung S21", gen:93, red:97, x2:92, x4:85, awm:46},
      {model: "Vivo Y20", gen:80, red:91, x2:90, x4:77, awm:42},
      {model: "Infinix Hot 10", gen:82, red:88, x2:86, x4:73, awm:40},
      {model: "OPPO A54", gen:78, red:85, x2:89, x4:68, awm:38},
      // add hundreds/thousands more!
    ];

    function similarity(str1, str2) {
      // Lowercase, basic match scoring
      str1=str1.toLowerCase(); str2=str2.toLowerCase();
      if (str1===str2) return 100;
      let words1 = str1.split(/\s+/), words2 = str2.split(/\s+/), score = 0;
      for(const w of words1) if(words2.includes(w)) score+=20;
      return score;
    }

    document.getElementById("search").addEventListener("input", function() {
      const query = this.value.trim().toLowerCase();
      const resultDiv = document.getElementById("result");
      if (!query) { resultDiv.style.display="none"; return; }

      // 1. Try exact and close matches
      let best = null, bestScore=0;
      for(const phone of sensiData) {
        const s = similarity(phone.model, query);
        if(s>bestScore) {bestScore=s; best=phone;}
      }

      if(bestScore>50) {
        // Good match found!
        resultDiv.innerHTML =
          `<b>${best.model}</b> Sensi:<br>
          General: <b>${best.gen}</b>, Red Dot: <b>${best.red}</b>, 2X: <b>${best.x2}</b>, 4X: <b>${best.x4}</b>, AWM: <b>${best.awm}</b>`;
        resultDiv.style.display="block";
      } else {
        // No good match found
        // Show closest (if above 0), else offer "Suggest!"
        let close = bestScore>0? `Closest: <b>${best.model}</b>` : "No match found.";
        resultDiv.innerHTML =
          `<span class="not-found">Device not found!</span><br>${close}<br>
           <span style='font-size:0.97em;color:#d8d8ff;'>Want your device added? <a style='color:#ffce34;' href="https://whatsapp.com/channel/0029VbB0EHkCMY0Cs3Rp7u3n" target="_blank">Send us on WhatsApp</a></span>`;
        resultDiv.style.display="block";
      }
    });
  </script>
</body>
</html>
